# ==========================================================
# RSS / Atom 订阅设置
# ==========================================================

# atom_feed:
#   hide: false              # 是否隐藏 RSS 订阅按钮（false=显示）
#   path:                   # RSS 路径（默认 feed.xml）


# ==========================================================
# SEO（搜索引擎优化）
# 用于 Google / Bing 等搜索引擎验证网站所有权
# ==========================================================

# google_site_verification :   # Google Search Console 验证码
# bing_site_verification   :    # Bing 网站验证
# alexa_site_verification  :    # Alexa（已停止服务）
# yandex_site_verification :    # Yandex 搜索引擎验证


# ==========================================================
# 社交分享（Social Sharing）
# 控制网页分享到社交媒体时的显示内容
# ==========================================================

# twitter:
#   username: &twitter          # Twitter / X 用户名

# facebook:
#   username:                   # Facebook 用户名
#   app_id:                     # Facebook 应用 ID
#   publisher:                  # 发布者 ID

# og_image:                    # Open Graph 默认分享图片
# og_description:              # 分享时的默认描述文字


# ==========================================================
# 结构化社交信息（SEO 用）
# ==========================================================

# social:
#   type:                      # Person（个人）或 Organization（组织）
#   name:                      # 如果显示名称与 site.name 不同可填写
#   links:                     # 社交媒体链接列表


# ==========================================================
# 网站访问统计（Analytics）
# ==========================================================

analytics:
  provider: "false"         # 是否启用统计：
                            # false = 关闭
                            # google = Google Analytics（旧版）
                            # google-analytics-4 = GA4（新版推荐）
                            # custom = 自定义统计

# ==========================================================
# 网站访问统计（Google Analytics）
# 用于统计网站访问量、用户来源等数据
# ==========================================================

google:
  tracking_id:            # Google Analytics 追踪 ID，例如：G-XXXXXXXXXX（没有就留空，不影响网站运行）


# ==========================================================
# 文件读取与构建控制（Reading Files）
# 控制 Jekyll 在生成网站时“包含/排除哪些文件”
# ==========================================================

include:
  - .htaccess            # 允许包含 Apache 配置文件（用于特殊服务器）
  - _pages               # 网站页面目录（必须包含，否则页面可能不生成）
  - files                # 用户上传文件目录（如 PDF、附件等）

exclude:
  - "*.sublime-project"   # 排除 Sublime 编辑器工程文件
  - "*.sublime-workspace" # 排除 Sublime 工作区文件
  - .asset-cache          # 缓存目录
  - .bundle               # Ruby Bundler 依赖目录
  - .github               # GitHub Actions 工作流目录（通常不打包进网站）
  - .jekyll-assets-cache  # Jekyll 资源缓存
  - .sass-cache           # Sass 编译缓存
  - assets/js/_main.js    # 主 JS 文件（模板内部使用）
  - assets/js/plugins     # JS 插件目录
  - assets/js/vendor      # 第三方 JS 库
  - CHANGELOG             # 更新日志文件
  - Capfile               # Ruby Capistrano 部署文件
  - config                # 配置目录
  - Dockerfile            # Docker 配置文件
  - Gemfile               # Ruby 依赖配置
  - Gruntfile.js         # 前端构建工具
  - gulpfile.js          # 前端构建工具
  - LICENSE              # 开源协议
  - local                # 本地开发文件
  - log                 # 日志文件
  - node_modules        # npm 依赖目录（非常大，必须排除）
  - package.json*       # npm 配置文件
  - Rakefile            # Ruby 构建任务文件
  - README              # README 文档
  - tmp                 # 临时文件
  - vendor              # 第三方依赖（Jekyll/Ruby）

# 👉 作用总结：
# 这些文件不会被生成到网站中，只用于开发环境


# ==========================================================
# 保留文件（Keep Files）
# ==========================================================

keep_files:
  - .git                # Git 版本控制文件（必须保留）
  - .svn                # SVN 版本控制文件


# ==========================================================
# 编码设置（Encoding）
# ==========================================================

encoding: "utf-8"        # 网站编码格式，必须使用 UTF-8（支持中文）


# ==========================================================
# Markdown 文件扩展名
# ==========================================================

markdown_ext: "markdown,mkdown,mkdn,mkd,md"
# 👉 支持哪些文件后缀作为 Markdown 文件


# ==========================================================
# Markdown 转换引擎（Conversion）
# ==========================================================

markdown: kramdown       # Markdown 解析器（Jekyll 默认）
highlighter: rouge       # 代码高亮工具（用于代码块颜色）
lsi: false               # 是否启用语义分析（false = 更快构建）
excerpt_separator: "\n\n" # 文章摘要分隔符（两个换行）
incremental: false       # 是否增量构建（false = 每次完整生成）


# ==========================================================
# Markdown 渲染详细配置（kramdown）
# ==========================================================
# ==========================================================
# Markdown 解析配置（kramdown）
# 控制 Markdown 如何被转换成 HTML
# ==========================================================

kramdown:

  input: GFM
  # 使用 GitHub 风格 Markdown（推荐，不要改）
  # 支持：#标题、列表、表格、任务清单、代码块等

  hard_wrap: false
  # 是否强制换行
  # false = 按 Markdown 规则换行（推荐）
  # true  = 每一行都换行（不推荐）

  auto_ids: true
  # 是否自动给标题生成锚点
  # 例如：# Hello → id="hello"
  # 用于目录跳转（建议开启）

  footnote_nr: 1
  # 脚注编号起始值（一般不用改）

  entity_output: as_char
  # HTML 实体输出方式（默认即可）

  toc_levels: 1..6
  # 目录（TOC）支持的标题层级
  # h1 ~ h6 全部支持

  smart_quotes: lsquo,rsquo,ldquo,rdquo
  # 智能引号（英文排版用）
  # 中文基本无影响，可以忽略

  enable_coderay: false
  # 旧代码高亮工具（已弃用）
  # false = 使用 rouge（推荐）


# ==========================================================
# 内容集合（Collections）
# 控制网站有哪些“内容类型”
# ==========================================================

collections:

  teaching:
    output: true
    # 是否生成独立网页（true = 会生成网页）

    permalink: /:collection/:path/
    # URL 规则
    # 示例：https://site.com/teaching/course1/

  publications:
    output: true
    permalink: /:collection/:path/
    # 论文页面生成规则

  portfolio:
    output: true
    permalink: /:collection/:path/
    # 项目作品页面（作品集）

  talks:
    output: true
    permalink: /:collection/:path/
    # 演讲 / 报告页面


# ==========================================================
# 页面默认配置（defaults）
# 控制不同类型文件的默认布局和功能
# ==========================================================

defaults:

  # ==========================================
  # 博客文章（_posts）
  # ==========================================
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      # 使用 single 单栏布局

      author_profile: true
      # 左侧显示作者信息

      read_time: true
      # 显示“阅读时间”

      comments: true
      # 是否允许评论（取决于 comments 配置）

      share: true
      # 是否显示分享按钮

      related: true
      # 是否显示相关文章推荐


  # ==========================================
  # 普通页面（_pages）
  # ==========================================
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true


  # ==========================================
  # 教学页面（_teaching）
  # ==========================================
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: true


  # ==========================================
  # 论文页面（_publications）
  # ==========================================
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: true


  # ==========================================
  # 作品集（_portfolio）
  # ==========================================
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comment: true
      # ⚠️ 注意这里是 comment（单数），可能是模板写错或兼容字段


  # ==========================================
  # 演讲页面（_talks）
  # ==========================================
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      # 使用 talk 专用布局（通常带时间/地图等）

      author_profile: true
      share: true


# ==========================================================
# CSS / 样式设置（Sass）
# ==========================================================

sass:

  sass_dir: _sass
  # SCSS 样式文件目录

  style: compressed
  # 压缩 CSS 输出（减小体积，加快加载）


# ==========================================================
# URL 生成规则（非常重要）
# ==========================================================

permalink: /:categories/:title/
# 文章 URL 结构：
# /分类/标题/

# paginate: 5
# 每页显示文章数量（已注释=未启用）

# paginate_path: /page:num/
# 分页路径规则


timezone: Etc/UTC
# 网站时区（UTC=标准时间）
# 可以改成 Asia/Shanghai


# ==========================================================
# 插件系统（Plugins）
# ==========================================================

plugins:

  - jekyll-feed
  # RSS 订阅支持

  - jekyll-gist
  # GitHub Gist 嵌入支持

  - jekyll-paginate
  # 分页功能

  - jekyll-sitemap
  # 自动生成 sitemap.xml（SEO重要）

  - jekyll-redirect-from
  # URL 重定向支持

  - jemoji
  # 支持 emoji（😀）


# ==========================================================
# GitHub Pages 安全模式兼容（whitelist）
# ==========================================================

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji
# 👉 GitHub Pages 允许使用的插件列表


# ==========================================================
# 分类 / 标签归档（Archives）
# ==========================================================

category_archive:
  type: liquid
  path: /categories/
  # 分类页面路径

tag_archive:
  type: liquid
  path: /tags/
  # 标签页面路径


# ==========================================================
# HTML 压缩优化（性能优化）
# ==========================================================

compress_html:

  clippings: all
  # 压缩 HTML（删除多余空格）

  ignore:
    envs: development
    # 开发环境不压缩，避免调试困难
