# ==============================
# 网站基础配置（Basic Site Settings）
# 这些配置决定网站的名称、地址、主题以及基本信息，是整个网站最重要的配置。
# ==============================

locale: "zh-CN"                  # 网站默认语言，例如：zh-CN（简体中文）、en-US（美国英语）
site_theme: "default"            # 网站主题，可选：default、air、sunrise、mint、dirt、contrast
title: "Huoban | Personal Homepage"   # 网站标题，会显示在浏览器标签、搜索引擎和网页标题中
title_separator: "-"             # 页面标题分隔符，例如："About - Huoban"
name: &name "Huoban"             # 网站作者名称（YAML 锚点），可在其他地方重复引用
description: &description "Huoban's academic portfolio"   # 网站简介，用于搜索引擎（SEO）和网页描述

url: "https://huoban123.github.io"    # 网站完整地址（不要以 / 结尾）
baseurl: ""                           # 网站子目录。个人主页仓库保持为空；如果仓库名不是 username.github.io，则填写 "/仓库名"
repository: "huoban123/huoban123.github.io"   # GitHub 仓库，格式：用户名/仓库名

# ==========================================
# 作者信息（Author）
# 控制网站左侧边栏显示的个人信息、学术主页和社交媒体链接。
# 如果某个字段留空，则对应的图标和链接不会显示。
# 如需进一步修改左侧边栏布局，可编辑：
# _includes/author-profile.html
# ==========================================

author:

  # ===== 基本个人信息 =====

  avatar           : "me.png"          # 头像图片文件名，图片放在 images/ 目录下，例如 images/profiles.png
  name             : "霍斑"     # 左侧边栏显示的姓名
  pronouns         :                         # 人称代词（国外常用），例如："he/him"、"she/her"、"they/them"，国内一般可留空
  bio              : "Short biography for the left-hand sidebar"   # 左侧边栏个人简介，可简单介绍研究方向、职位等
  location         : "Shanghai, China"                 # 所在地区，例如："Beijing, China"、"Shanghai, China"
  employer         : "College of Artificial Intelligence, Hanjiang Normal University"  # 工作单位或学校，例如："Tsinghua University"
  uri              :                         # 个人主页网址，例如：https://yourname.com
  email            : "huoban@hjnu.edu.cn"      # 联系邮箱

  # ===== 学术平台（Academic Websites）=====
  # 填写完整网址（URL），留空则不显示对应图标。

  academia         :                         # Academia.edu 个人主页
  arxiv            :                         # arXiv 作者主页
  googlescholar    :                         # Google Scholar 个人主页
  inspire-hep      :                         # INSPIRE-HEP（高能物理领域）
  impactstory      :                         # Impactstory / OurResearch
  orcid            : "https://orcid.org/0009-0007-8162-1827"   # ORCID 学者唯一身份标识
  semantic         :                         # Semantic Scholar 个人主页
  ssrn             :                         # SSRN 作者主页（社会科学等）
  pubmed           :                         # PubMed 作者检索页面（医学领域）
  researchgate     :                         # ResearchGate 个人主页
  scopus           :                         # Scopus Author ID 页面
  zotero           :                         # Zotero 文献库主页

  # ===== 代码托管与开发平台 =====
  # 一般填写用户名即可，系统会自动拼接链接。

  bitbucket        :                         # Bitbucket 用户名
  codepen          :                         # CodePen 用户名
  dribbble         :                         # Dribbble 用户名（设计师作品展示）
  github           : "WVRAINS"               # GitHub 用户名（建议改为你的 GitHub 用户名，如 huoban123）
  kaggle           :                         # Kaggle 用户名（数据科学竞赛平台）
  stackoverflow    :                         # Stack Overflow 用户编号，例如：123456 或 123456/username

  # ===== 社交媒体 =====
  # 一般填写用户名；个别平台需要填写完整网址。

  artstation       :                         # ArtStation 用户名（艺术作品）
  bluesky          :                         # Bluesky 用户名，例如：yourname.bsky.social
  facebook         :                         # Facebook 用户名
  flickr           :                         # Flickr 用户名
  foursquare       :                         # Foursquare 用户名
  goodreads        :                         # Goodreads 用户名（读书社区）
  google_plus      :                         # Google+（已停止服务，可留空）
  keybase          :                         # Keybase 用户名
  instagram        :                         # Instagram 用户名
  lastfm           :                         # Last.fm 用户名（音乐平台）
  linkedin         :                         # LinkedIn 用户名（职业社交）
  mastodon         :                         # Mastodon 完整主页网址
  medium           :                         # Medium 个人主页网址
  pinterest        :                         # Pinterest 用户名
  soundcloud       :                         # SoundCloud 用户名
  steam            :                         # Steam 用户名
  telegram         :                         # Telegram 个人链接（完整 URL）
  tumblr           :                         # Tumblr 用户名
  twitter          :                         # X（原 Twitter）用户名，不需要 @
  vine             :                         # Vine（已停止服务，可留空）
  weibo            :                         # 微博用户名
  wikipedia        :                         # Wikipedia 用户名
  xing             :                         # Xing 用户名（欧洲职业社交平台）
  youtube          :                         # YouTube 用户名或频道 ID
  zhihu            :                         # 知乎用户名

# ==========================================================
# 出版物分类（Publication Category）
# 控制 publications 页面中论文的分类标题显示
# ==========================================================

publication_category:
  # books:
  #   title: 'Books'              # 书籍分类标题（可改成“专著”）
  manuscripts:
    title: 'Journal Articles'   # 期刊论文分类标题
  # conferences:
  #   title: 'Conference Papers'  # 会议论文分类标题


# ==========================================================
# 网站功能设置（Site Settings）
# 控制页面显示效果、阅读体验、评论系统等功能
# ==========================================================

teaser:                        # 社交媒体分享时的默认预览图片（放在 /images/ 目录）
breadcrumbs: false             # 是否显示“面包屑导航”（类似：首页 > 博客 > 文章）
words_per_minute: 160          # 阅读速度估算（用于显示“预计阅读时间”）
future: true                   # 是否显示未来日期的文章（true=允许显示未来发布时间）
read_more: "disabled"          # 是否在摘要后显示“Read more”按钮（disabled=关闭）
talkmap_link: false            # 是否在 Talks 页面显示“地图链接”（talkmap 功能开关）


# ==========================================================
# 评论系统（Comments）
# 用于文章底部评论功能，目前支持多种平台
# ==========================================================

